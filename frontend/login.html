<!DOCTYPE html>
<html>
<head>

  <title>Login - CvCodeHub</title>

  <link rel="stylesheet" href="css.css/style.css">

</head>

<body>

<div class="auth-container">

  <div class="box">

    <h1>Login</h1>

    <input
      type="email"
      id="login-email"
      placeholder="Email"
    >

    <input
      type="password"
      id="login-password"
      placeholder="Password"
    >

    <button onclick="login()">
      Login
    </button>

    <p>
      Don't have an account?
      <a href="signup.html">
        Sign Up
      </a>
    </p>

  </div>

</div>

<script type="module" src="java.js/auth.js"></script>

</body>
</html>
