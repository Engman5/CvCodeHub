<!DOCTYPE html>
<html>
<head>

  <title>Sign Up - CvCodeHub</title>

  <link rel="stylesheet" href="css.css/style.css">

</head>

<body>

<div class="auth-container">

  <div class="box">

    <h1>Create Account</h1>

    <input
      type="text"
      id="signup-name"
      placeholder="Full Name"
    >

    <input
      type="email"
      id="signup-email"
      placeholder="Email"
    >

    <input
      type="password"
      id="signup-password"
      placeholder="Password"
    >

    <button onclick="signup()">
      Create Account
    </button>

    <p>
      Already have an account?
      <a href="login.html">
        Login
      </a>
    </p>

  </div>

</div>

<script type="module" src="java.js/auth.js"></script>

</body>
</html>
